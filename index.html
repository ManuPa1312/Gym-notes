<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no"/>
<meta name="mobile-web-app-capable" content="yes"/>
<meta name="apple-mobile-web-app-capable" content="yes"/>
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent"/>
<meta name="theme-color" content="#0a0a0a"/>
<title>GymNotes</title>
<link href="https://fonts.googleapis.com/css2?family=Barlow+Condensed:wght@400;600;700;900&family=Barlow:wght@400;500;600;700;800&display=swap" rel="stylesheet"/>
<style>
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent;}
:root{
  --bg:#0a0a0a;--bg2:#111;--bg3:#1a1a1a;--bg4:#222;--bg5:#2a2a2a;
  --b1:#2e2e2e;--b2:#383838;
  --tx:#fff;--tx2:#ccc;--tx3:#888;--tx4:#555;--tx5:#3a3a3a;
  --y:#F5C842;--y2:rgba(245,200,66,.15);--y3:rgba(245,200,66,.08);
  --o:#e08c2a;--g:#4ade80;--r:#f87171;--b:#60a5fa;--p:#c084fc;--t:#2dd4bf;
  --sb:env(safe-area-inset-bottom,0px);
  --fd:'Barlow Condensed',sans-serif;--fb:'Barlow',sans-serif;
}
html,body{height:100%;background:#000;color:var(--tx);font-family:var(--fb);overflow:hidden;}
#root{height:100%;max-width:480px;margin:0 auto;display:flex;flex-direction:column;background:var(--bg2);position:relative;}

/* ── SCROLL ── */
.scroll{flex:1;overflow-y:auto;-webkit-overflow-scrolling:touch;}
.scroll::-webkit-scrollbar{display:none;}
.pad{padding:12px 14px calc(24px + var(--sb));}

/* ── HEADER ── */
.topbar{display:flex;align-items:center;justify-content:space-between;padding:14px 14px 10px;flex-shrink:0;border-bottom:1px solid var(--b1);background:var(--bg2);}
.logo{font-family:var(--fd);font-size:24px;font-weight:900;letter-spacing:2px;color:var(--tx);}
.logo b{color:var(--y);}
.sub{font-size:11px;color:var(--tx3);margin-top:1px;}

/* ── NAVBAR ── */
.nav{display:flex;height:calc(58px + var(--sb));background:var(--bg);border-top:1px solid var(--b1);padding-bottom:var(--sb);flex-shrink:0;}
.nb{flex:1;background:none;border:none;cursor:pointer;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:3px;font-family:var(--fb);}
.nb .ni{font-size:19px;}
.nb .nl{font-size:9px;font-weight:700;letter-spacing:.5px;color:var(--tx4);}
.nb.on .nl{color:var(--y);}

/* ── BUTTONS ── */
.btn{background:var(--y);color:#111;border:none;border-radius:12px;padding:13px;font-size:14px;font-weight:800;cursor:pointer;display:flex;align-items:center;justify-content:center;gap:7px;width:100%;font-family:var(--fb);letter-spacing:.3px;}
.btn-sm{background:var(--y);border:none;border-radius:9px;padding:7px 15px;font-weight:800;font-size:12px;cursor:pointer;color:#111;font-family:var(--fb);}
.btn-ghost{background:transparent;border:1px solid var(--b2);border-radius:10px;padding:10px;color:var(--tx3);font-size:13px;cursor:pointer;font-family:var(--fb);width:100%;text-align:center;}
.btn-back{background:transparent;border:none;color:var(--y);font-size:26px;cursor:pointer;padding:0 2px;line-height:1;}
.btn-icon{background:var(--bg3);border:1px solid var(--b1);border-radius:9px;padding:7px;color:var(--tx2);cursor:pointer;display:flex;align-items:center;line-height:0;}
.btn-del{background:transparent;border:none;color:var(--r);cursor:pointer;padding:5px;font-size:15px;}
.btn-edit{background:transparent;border:none;color:var(--tx4);cursor:pointer;padding:5px;font-size:14px;}
.btn-add{border:2px dashed var(--b1);border-radius:11px;padding:12px;color:var(--tx4);font-size:13px;cursor:pointer;background:transparent;display:flex;align-items:center;justify-content:center;gap:6px;width:100%;font-family:var(--fb);}
.btn-mini{background:var(--y3);border:1px solid rgba(245,200,66,.25);border-radius:6px;padding:5px 9px;color:var(--y);font-size:11px;cursor:pointer;font-family:var(--fb);font-weight:700;display:inline-flex;align-items:center;gap:3px;}

/* ── CARD ── */
.card{background:var(--bg3);border-radius:13px;padding:13px;margin-bottom:9px;border:1px solid var(--b1);}
.card-t{font-size:15px;font-weight:700;color:var(--tx);margin-bottom:2px;}
.card-d{font-size:11px;color:var(--tx3);margin-bottom:6px;}

/* ── CHIPS ── */
.chips{display:flex;gap:5px;overflow-x:auto;scrollbar-width:none;padding:8px 14px;}
.chips::-webkit-scrollbar{display:none;}
.chip{background:var(--bg3);border:1px solid var(--b1);border-radius:20px;padding:5px 11px;font-size:11px;color:var(--tx3);cursor:pointer;white-space:nowrap;font-family:var(--fb);font-weight:600;flex-shrink:0;}
.chip.on{background:var(--y2);border-color:var(--y);color:var(--y);}

/* ── BADGE ── */
.badge{font-size:10px;background:var(--bg4);border-radius:5px;padding:2px 7px;border:1px solid var(--b1);color:var(--tx2);display:inline-block;}
.tag{display:inline-block;font-size:10px;border-radius:5px;padding:2px 7px;font-weight:700;}

/* ── FORM ── */
.fg{margin-bottom:11px;}
.lbl{display:block;font-size:10px;color:var(--tx3);margin-bottom:4px;font-weight:700;letter-spacing:.5px;text-transform:uppercase;}
input,select,textarea{width:100%;background:var(--bg3);border:1px solid var(--b1);border-radius:9px;padding:10px 11px;color:var(--tx);font-size:14px;outline:none;font-family:var(--fb);-webkit-appearance:none;}
input:focus,select:focus,textarea:focus{border-color:rgba(245,200,66,.5);}
input::placeholder,textarea::placeholder{color:var(--tx5);}
textarea{resize:none;height:64px;}

/* ── DAY TAB ── */
.daytabs{display:flex;gap:5px;overflow-x:auto;scrollbar-width:none;padding:0 14px 8px;flex-shrink:0;}
.daytabs::-webkit-scrollbar{display:none;}
.dtab{background:var(--bg3);border:1px solid var(--b1);border-radius:10px;padding:7px 13px;font-size:12px;font-weight:700;color:var(--tx3);cursor:pointer;white-space:nowrap;flex-shrink:0;font-family:var(--fd);letter-spacing:.5px;}
.dtab.on{background:var(--y2);border-color:var(--y);color:var(--y);}
.dtab-add{background:transparent;border:1px dashed var(--b2);border-radius:10px;padding:7px 11px;font-size:18px;color:var(--tx4);cursor:pointer;flex-shrink:0;}

/* ── BLOCK CARD ── */
.bcard{border-radius:12px;margin-bottom:8px;border:1px solid var(--b1);overflow:hidden;background:var(--bg3);}
.bcard-hdr{display:flex;align-items:center;gap:8px;padding:11px 12px;cursor:pointer;user-select:none;}
.bnum{width:24px;height:24px;border-radius:6px;display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:900;color:#111;flex-shrink:0;font-family:var(--fd);}
.btype-tag{font-size:9px;font-weight:700;letter-spacing:1px;padding:2px 6px;border-radius:4px;}
.bname{font-size:13px;font-weight:600;color:var(--tx2);flex:1;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.bsub{font-size:10px;color:var(--tx3);margin-top:1px;}
.bcard-body{padding:12px;border-top:1px solid var(--b1);}

/* ── PROGRESS PILL ── */
.prog-bar{height:3px;background:var(--b1);border-radius:2px;overflow:hidden;margin-top:6px;}
.prog-fill{height:100%;border-radius:2px;transition:width .4s;}

/* ── SETS TABLE ── */
.stbl{width:100%;border-collapse:collapse;}
.stbl th{font-size:9px;color:var(--tx4);font-weight:700;letter-spacing:.5px;padding:3px 3px 6px;text-align:center;}
.stbl td{padding:3px;}
.stbl td input{background:var(--bg4);border:1px solid var(--b1);border-radius:6px;padding:6px 3px;font-size:12px;text-align:center;color:var(--tx);width:100%;}
.stbl .sn{text-align:center;font-size:11px;color:var(--y);font-weight:700;width:22px;}

/* ── LOG WEEK ── */
.wk-card{border:1px solid var(--b1);border-radius:10px;padding:11px;margin-bottom:7px;}
.wk-on{border-color:rgba(245,200,66,.3);background:rgba(245,200,66,.04);}
.wk-done{border-color:rgba(74,222,128,.25);background:rgba(74,222,128,.04);}
.set-pill{display:inline-flex;align-items:center;gap:4px;background:var(--bg4);border:1px solid var(--b1);border-radius:7px;padding:5px 8px;margin:3px;font-size:12px;}
.set-pill input{background:transparent;border:none;padding:0;font-size:12px;color:var(--tx);width:40px;text-align:center;font-family:var(--fb);}
.set-pill.pr{border-color:rgba(245,200,66,.4);}

/* ── CHART ── */
.chart-wrap{background:var(--bg3);border-radius:12px;padding:14px;margin-bottom:10px;border:1px solid var(--b1);}
canvas{display:block;width:100% !important;}

/* ── MODAL / SHEET ── */
.overlay{position:fixed;inset:0;background:rgba(0,0,0,.75);z-index:200;display:flex;align-items:flex-end;}
.sheet{background:var(--bg2);border-radius:20px 20px 0 0;width:100%;max-height:82vh;overflow-y:auto;padding:18px 14px calc(20px + var(--sb));}
.sheet-t{font-family:var(--fd);font-size:19px;font-weight:900;letter-spacing:1px;margin-bottom:14px;}
.sheet-opt{display:flex;align-items:center;gap:12px;background:var(--bg3);border-radius:12px;padding:13px;margin-bottom:8px;border:1px solid var(--b1);cursor:pointer;width:100%;text-align:left;}
.sheet-opt:active{background:var(--bg4);}
.sheet-opt .oi{font-size:24px;}
.sheet-opt .ol{font-size:14px;font-weight:700;}
.sheet-opt .os{font-size:11px;color:var(--tx3);margin-top:1px;}

/* ── MONTH SELECTOR ── */
.month-row{display:flex;align-items:center;justify-content:space-between;padding:10px 14px;border-bottom:1px solid var(--b1);background:var(--bg2);}
.month-lbl{font-family:var(--fd);font-size:17px;font-weight:700;color:var(--y);letter-spacing:1px;}
.month-nav{background:var(--bg3);border:1px solid var(--b1);border-radius:8px;padding:6px 12px;color:var(--tx2);cursor:pointer;font-size:14px;}

/* ── EMOM / AMRAP ── */
.emom-box{background:var(--bg4);border-radius:9px;padding:10px;margin-bottom:8px;}
.emom-row{display:flex;gap:8px;margin-bottom:6px;}
.emom-row input{flex:1;}

/* ── MISC ── */
.row{display:flex;align-items:center;gap:8px;}
.rsb{display:flex;align-items:center;justify-content:space-between;}
.f1{flex:1;}
.mt8{margin-top:8px;}
.mb8{margin-bottom:8px;}
.mb12{margin-bottom:12px;}
.sec{font-size:11px;font-weight:700;letter-spacing:1px;color:var(--tx3);margin:14px 0 7px;text-transform:uppercase;}
.divider{height:1px;background:var(--b1);margin:10px 0;}
.empty{display:flex;flex-direction:column;align-items:center;justify-content:center;padding:48px 20px;text-align:center;color:var(--tx4);line-height:1.7;}
.empty .ei{font-size:40px;margin-bottom:10px;}
@keyframes fu{from{opacity:0;transform:translateY(6px)}to{opacity:1;transform:translateY(0)}}
.fa{animation:fu .16s ease;}
@keyframes su{from{transform:translateY(100%)}to{transform:translateY(0)}}
.sheet{animation:su .2s ease;}

/* BLOCK TYPE COLORS */
.tc-single{color:#aaa;} .bg-single{background:#555;}
.tc-superset{color:var(--y);} .bg-superset{background:var(--y);}
.tc-triset{color:var(--o);} .bg-triset{background:var(--o);}
.tc-emom{color:var(--b);} .bg-emom{background:var(--b);}
.tc-amrap{color:var(--p);} .bg-amrap{background:var(--p);}
.tc-circuit{color:var(--t);} .bg-circuit{background:var(--t);}
</style>
</head>
<body>
<div id="root"></div>
<script>
// ═══════════════════════════════════════════════════════════════
// UTILS
// ═══════════════════════════════════════════════════════════════
const uid=()=>Math.random().toString(36).slice(2,9);
const esc=s=>String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
const clone=v=>JSON.parse(JSON.stringify(v));
const fmtDate=iso=>new Date(iso).toLocaleDateString('it-IT',{day:'2-digit',month:'short',year:'numeric'});
const monthKey=(y,m)=>`${y}-${String(m+1).padStart(2,'0')}`;
const monthLabel=(y,m)=>new Date(y,m,1).toLocaleDateString('it-IT',{month:'long',year:'numeric'}).replace(/^\w/,c=>c.toUpperCase());
const MUSCLES=['Petto','Schiena','Spalle','Bicipiti','Tricipiti','Gambe','Glutei','Addome','Full Body','Cardio'];
const BLOCK_TYPES=[
  {t:'single',  label:'Esercizio',  emoji:'💪', sub:'Un esercizio con serie'},
  {t:'superset',label:'Super Set',  emoji:'⚡', sub:'2 esercizi in sequenza'},
  {t:'triset',  label:'Tri Set',    emoji:'🔥', sub:'3 esercizi in sequenza'},
  {t:'emom',    label:'EMOM',       emoji:'⏱️', sub:'Every Minute On the Minute'},
  {t:'amrap',   label:'AMRAP',      emoji:'🔄', sub:'As Many Rounds As Possible'},
  {t:'circuit', label:'Circuito',   emoji:'🔁', sub:'Serie di esercizi a rotazione'},
];

const load=(k,d)=>{try{const v=localStorage.getItem(k);return v?JSON.parse(v):d;}catch{return d;}};
const save=(k,v)=>{try{localStorage.setItem(k,JSON.stringify(v));}catch{}};

// ═══════════════════════════════════════════════════════════════
// DATA FACTORIES
// ═══════════════════════════════════════════════════════════════
const newSetPlan=()=>({id:uid(),weight:'',reps:'',rest:'60'});
const newExEntry=(defId=null)=>({id:uid(),defId,sets:[newSetPlan()],logs:[]});

const newBlock=(type)=>{
  const b={id:uid(),type,note:''};
  if(type==='single')   b.exercise=newExEntry();
  if(type==='superset') b.exercises=[newExEntry(),newExEntry()];
  if(type==='triset')   b.exercises=[newExEntry(),newExEntry(),newExEntry()];
  if(type==='emom')     {b.duration=20;b.interval=1;b.exercises=[{id:uid(),text:'',reps:''}];}
  if(type==='amrap')    {b.duration=10;b.exercises=[{id:uid(),text:'',reps:''}];}
  if(type==='circuit')  {b.rounds=3;b.rest=30;b.exercises=[newExEntry()];}
  return b;
};

const newDay=(name)=>({id:uid(),name:name||'Giorno',blocks:[]});

// A "month plan" = { key, label, year, month, days:[], weeks:4 }
const newMonthPlan=(year,month)=>({
  id:uid(), key:monthKey(year,month),
  label:monthLabel(year,month),
  year,month,
  days:[newDay('Giorno A'),newDay('Giorno B'),newDay('Giorno C')],
  weeks:4,
  createdAt:new Date().toISOString(),
});

const newDef=()=>({id:uid(),name:'',muscle:MUSCLES[0],notes:''});

// Best weight for an exercise entry
const bestW=ex=>{let b=0;(ex.logs||[]).forEach(l=>l.sets?.forEach(s=>{const w=parseFloat(s.weight)||0;if(w>b)b=w;}));return b;};
const lastLog=ex=>(ex.logs||[]).slice(-1)[0]||null;

// ═══════════════════════════════════════════════════════════════
// STATE
// ═══════════════════════════════════════════════════════════════
const now=new Date();
let S={
  view:'home',        // home|library|addDef|month|day|blockLog|progress
  defs:load('gn_defs',[]),
  months:load('gn_months',[]),
  activeMonth:null,   // monthPlan object (being edited)
  activeDayId:null,
  activeBlockId:null,
  activeExIdx:0,
  editingDef:null,
  libFilter:'Tutti',
  sheet:null,         // null|'addBlock'|'addDay'|'pickMonth'
  sheetDayId:null,
  currentYear:now.getFullYear(),
  currentMonthIdx:now.getMonth(),
  expandedBlock:null,
};

function ss(patch){
  Object.assign(S,typeof patch==='function'?patch(S):patch);
  if('defs' in (typeof patch==='function'?{}:patch)) save('gn_defs',S.defs);
  if('months' in (typeof patch==='function'?{}:patch)) save('gn_months',S.months);
  render();
}
function saveMonths(){save('gn_months',S.months);}

// Silent state update — saves to state+storage but does NOT re-render (used during typing)
function silentUpdate(fn){
  fn();
  if(S.activeMonth) save('gn_months', S.months.map(m=>m.id===S.activeMonth.id?S.activeMonth:m));
  if(S.defs) save('gn_defs',S.defs);
}

// ═══════════════════════════════════════════════════════════════
// RENDER ROOT
// ═══════════════════════════════════════════════════════════════
function render(){
  const root=document.getElementById('root');
  const showNav=['home','library','progress'].includes(S.view);
  root.innerHTML=`
    ${renderView()}
    ${showNav?renderNav():''}
    ${S.sheet?renderSheet():''}
  `;
  bindAll();
  if(S.view==='progress') drawCharts();
}

function renderNav(){
  const tabs=[
    {v:'home',   i:'🗓️',  l:'Mesi'},
    {v:'progress',i:'📈', l:'Progressi'},
    {v:'library',i:'📋',  l:'Esercizi'},
  ];
  return`<nav class="nav">${tabs.map(t=>`
    <button class="nb ${S.view===t.v?'on':''}" data-a="nav" data-v="${t.v}">
      <span class="ni">${t.i}</span><span class="nl">${t.l}</span>
    </button>`).join('')}</nav>`;
}

// ═══════════════════════════════════════════════════════════════
// HOME — lista mesi
// ═══════════════════════════════════════════════════════════════
function renderView(){
  switch(S.view){
    case'home':     return renderHome();
    case'library':  return renderLibrary();
    case'addDef':   return renderAddDef();
    case'month':    return renderMonth();
    case'day':      return renderDay();
    case'blockLog': return renderBlockLog();
    case'progress': return renderProgress();
  }
  return'';
}

function renderHome(){
  const months=[...S.months].sort((a,b)=>b.key.localeCompare(a.key));
  return`
  <div class="topbar">
    <div><div class="logo">GYM<b>NOTES</b></div><div class="sub">${S.months.length} schede mensili</div></div>
    <button class="btn-icon" data-a="new-month">+</button>
  </div>
  <div class="scroll pad">
    <button class="btn mb8" data-a="new-month">+ Nuova Scheda Mensile</button>
    ${months.length===0?`<div class="empty"><div class="ei">📅</div><div>Nessuna scheda ancora.<br>Creane una per questo mese!</div></div>`
    :months.map(m=>{
      const dayCount=m.days?.length||0;
      const exCount=m.days?.reduce((n,d)=>n+d.blocks.reduce((nb,b)=>nb+(b.type==='single'?1:(b.exercises?.length||1)),0),0)||0;
      return`<div class="card fa" data-a="open-month" data-id="${m.id}" style="cursor:pointer">
        <div class="rsb">
          <div class="f1">
            <div class="card-t">${esc(m.label)}</div>
            <div class="card-d">${fmtDate(m.createdAt)}</div>
            <div class="row" style="gap:5px;flex-wrap:wrap">
              <span class="badge">${dayCount} giorni</span>
              <span class="badge">${exCount} esercizi</span>
              <span class="badge">${m.weeks||4} settimane</span>
            </div>
          </div>
          <div class="row" style="gap:4px;margin-left:8px" onclick="event.stopPropagation()">
            <button class="btn-edit" data-a="edit-month" data-id="${m.id}">✏️</button>
            <button class="btn-del" data-a="del-month" data-id="${m.id}">🗑️</button>
          </div>
        </div>
      </div>`;
    }).join('')}
  </div>`;
}

// ═══════════════════════════════════════════════════════════════
// MONTH VIEW — giorni
// ═══════════════════════════════════════════════════════════════
function renderMonth(){
  const m=S.activeMonth;
  if(!m) return'';
  const activeDay=m.days.find(d=>d.id===S.activeDayId)||m.days[0];

  return`
  <div class="topbar">
    <button class="btn-back" data-a="back-month">←</button>
    <div class="f1 row" style="gap:8px;margin:0 8px">
      <div>
        <div class="logo" style="font-size:18px">${esc(m.label)}</div>
        <div class="sub">${m.weeks} settimane · ${m.days.length} giorni</div>
      </div>
    </div>
    <button class="btn-sm" data-a="save-month">Salva</button>
  </div>

  <!-- Day tabs -->
  <div class="daytabs" style="margin-top:8px">
    ${m.days.map(d=>`
      <button class="dtab ${activeDay&&d.id===activeDay.id?'on':''}" data-a="sel-day" data-did="${d.id}">
        ${esc(d.name)}
      </button>`).join('')}
    <button class="dtab-add" data-a="add-day">＋</button>
  </div>

  ${activeDay?renderDayContent(activeDay):'<div class="pad"><div class="empty"><div class="ei">👆</div><div>Seleziona un giorno</div></div></div>'}
  `;
}

function renderDayContent(day){
  return`<div class="scroll pad" style="padding-top:4px">
    <!-- Day name edit -->
    <div class="row mb8" style="gap:8px">
      <input id="dayname" value="${esc(day.name)}" placeholder="Nome giorno (es. Push, Petto...)" style="flex:1" data-did="${day.id}"/>
      <button class="btn-del" data-a="del-day" data-did="${day.id}" title="Elimina giorno">🗑️</button>
    </div>
    <!-- Blocks -->
    ${day.blocks.map((b,i)=>renderBlockCard(b,i,day.id)).join('')}
    <button class="btn-add mt8" data-a="open-add-block" data-did="${day.id}">＋ Aggiungi blocco</button>
  </div>`;
}

// ═══════════════════════════════════════════════════════════════
// BLOCK CARD
// ═══════════════════════════════════════════════════════════════
const BCOLOR={single:'#888',superset:'#F5C842',triset:'#e08c2a',emom:'#60a5fa',amrap:'#c084fc',circuit:'#2dd4bf'};
const BLABEL={single:'',superset:'⚡ SUPER SET',triset:'🔥 TRI SET',emom:'⏱ EMOM',amrap:'🔄 AMRAP',circuit:'🔁 CIRCUITO'};

function renderBlockCard(b,idx,dayId){
  const col=BCOLOR[b.type]||'#888';
  const lbl=BLABEL[b.type]||'';
  const isExp=S.expandedBlock===b.id;

  // Summary line
  let summary='';
  if(b.type==='single'){
    const nm=S.defs.find(d=>d.id===b.exercise?.defId)?.name||'Esercizio';
    const ll=lastLog(b.exercise);
    const bw=bestW(b.exercise);
    summary=`<div class="f1"><div class="bname">${esc(nm)}</div>
      <div class="bsub">${ll?`Ultima: ${ll.sets?.map(s=>s.weight+'kg').join('/')||'—'}`:'Nessun log'}${bw?` · Max: ${bw}kg`:''}</div></div>`;
  } else if(b.type==='emom'){
    summary=`<div class="bname">${b.duration}min EMOM · ${b.exercises?.length||0} esercizi</div>`;
  } else if(b.type==='amrap'){
    summary=`<div class="bname">${b.duration}min AMRAP · ${b.exercises?.length||0} esercizi</div>`;
  } else if(b.type==='circuit'){
    summary=`<div class="bname">Circuito ${b.rounds||3}x · ${b.exercises?.length||0} esercizi</div>`;
  } else {
    const names=(b.exercises||[]).map(e=>S.defs.find(d=>d.id===e.defId)?.name||'—').join(' + ');
    summary=`<div class="bname">${esc(names)||'Esercizi'}</div>`;
  }

  let body='';
  if(isExp){
    body=`<div class="bcard-body">${renderBlockEditor(b,dayId)}`;
    // Log button for single
    if(b.type==='single'&&b.exercise?.defId){
      body+=`<button class="btn-add mt8" style="border-color:rgba(74,222,128,.3);color:var(--g)" data-a="go-log" data-bid="${b.id}" data-did="${dayId}">📈 Progressione settimana per settimana</button>`;
    }
    body+=`</div>`;
  }

  return`
  <div class="bcard" style="border-top:2px solid ${col}">
    <div class="bcard-hdr" data-a="toggle-block" data-bid="${b.id}">
      <span class="bnum" style="background:${col}">${idx+1}</span>
      ${lbl?`<span class="btype-tag" style="color:${col};background:${col}22;font-size:9px;padding:2px 5px;border-radius:4px;font-weight:700;letter-spacing:.5px">${lbl}</span>`:''}
      ${summary}
      <div class="row" style="gap:3px;margin-left:6px" onclick="event.stopPropagation()">
        <button class="btn-del" data-a="del-block" data-bid="${b.id}" data-did="${dayId}">🗑️</button>
        <span style="color:var(--tx4);font-size:14px">${isExp?'▾':'▸'}</span>
      </div>
    </div>
    ${body}
  </div>`;
}

// ═══════════════════════════════════════════════════════════════
// BLOCK EDITOR (inside block card)
// ═══════════════════════════════════════════════════════════════
function renderBlockEditor(b,dayId){
  if(b.type==='single')   return renderExEditor(b.exercise,`sx-${b.id}`);
  if(b.type==='superset'||b.type==='triset') return renderMultiEx(b,dayId);
  if(b.type==='emom')     return renderEmom(b,dayId);
  if(b.type==='amrap')    return renderAmrap(b,dayId);
  if(b.type==='circuit')  return renderCircuit(b,dayId);
  return'';
}

function renderExEditor(entry,prefix){
  const defOpts=MUSCLES.map(g=>{
    const gr=S.defs.filter(d=>d.muscle===g);
    if(!gr.length)return'';
    return`<optgroup label="${g}">${gr.map(d=>`<option value="${d.id}" ${entry.defId===d.id?'selected':''}>${esc(d.name)}</option>`).join('')}</optgroup>`;
  }).join('');

  const rows=entry.sets.map((s,si)=>`<tr>
    <td class="sn">${si+1}</td>
    <td><input type="number" data-f="sw" data-p="${prefix}" data-sid="${s.id}" value="${s.weight}" placeholder="0"/></td>
    <td><input type="number" data-f="sr" data-p="${prefix}" data-sid="${s.id}" value="${s.reps}" placeholder="8"/></td>
    <td><input type="number" data-f="srest" data-p="${prefix}" data-sid="${s.id}" value="${s.rest}" placeholder="60"/></td>
    <td style="text-align:center"><button class="btn-del" data-a="del-set" data-p="${prefix}" data-sid="${s.id}" style="padding:2px">×</button></td>
  </tr>`).join('');

  return`
  <div class="fg">
    <label class="lbl">Esercizio</label>
    <select data-f="edef" data-p="${prefix}"><option value="">— Seleziona —</option>${defOpts}</select>
  </div>
  <div class="rsb mb8"><label class="lbl" style="margin:0">Serie</label>
    <button class="btn-mini" data-a="add-set" data-p="${prefix}">＋ Serie</button>
  </div>
  <table class="stbl"><thead><tr><th>#</th><th>Kg</th><th>Rip.</th><th>Rec(s)</th><th></th></tr></thead>
  <tbody>${rows}</tbody></table>`;
}

function renderMultiEx(b,dayId){
  const col=BCOLOR[b.type];
  return b.exercises.map((ex,ei)=>`
    <div style="margin-bottom:12px">
      <div style="font-size:10px;font-weight:700;letter-spacing:1px;color:${col};margin-bottom:6px">ESERCIZIO ${ei+1}</div>
      ${renderExEditor(ex,`mx-${b.id}-${ei}`)}
    </div>`).join('')
  +`<div class="fg"><label class="lbl">Recupero tra blocchi (sec)</label>
    <input type="number" style="max-width:90px" data-f="brest" data-bid="${b.id}" value="${b.rest||90}" placeholder="90"/></div>`;
}

// ═══════════════════════════════════════════════════════════════
// BLOCK LOG / PROGRESSIONE
// ═══════════════════════════════════════════════════════════════
function renderBlockLog(){
  const m=S.activeMonth;
  if(!m) return'';
  const day=m.days.find(d=>d.id===S.activeDayId);
  if(!day) return'';
  const b=day.blocks.find(x=>x.id===S.activeBlockId);
  if(!b||b.type!=='single') return'';
  const ex=b.exercise;
  const defName=S.defs.find(d=>d.id===ex.defId)?.name||'Esercizio';
  const weeks=parseInt(m.weeks)||4;
  const bw=bestW(ex);
  const logs=ex.logs||[];
  const done=new Set(logs.map(l=>l.week)).size;
  const pct=weeks?Math.round(done/weeks*100):0;
  const currentWeek=done+1;

  const weekCards=Array.from({length:weeks},(_,i)=>{
    const wk=i+1;
    const log=logs.find(l=>l.week===wk);
    const hasLog=!!log;
    const isCurrent=!hasLog&&wk===currentWeek;
    const isFuture=!hasLog&&wk>currentWeek;
    const col=hasLog?'var(--g)':isCurrent?'var(--y)':'var(--tx4)';
    const cls=hasLog?'wk-done':isCurrent?'wk-on':'';

    let setsHtml='';
    if(hasLog){
      setsHtml=log.sets.map((s,si)=>{
        const pl=(ex.sets||[])[si];
        const pr=parseFloat(s.weight)>=(parseFloat(pl?.weight)||0)&&s.weight;
        return`<span class="set-pill ${pr?'pr':''}">
          <span style="font-size:10px;color:var(--tx3)">${si+1}.</span>
          <input type="number" value="${s.weight}" data-f="lw" data-wk="${wk}" data-si="${si}" placeholder="kg"/>
          <span style="font-size:10px;color:var(--tx3)">kg×</span>
          <input type="number" value="${s.reps}" data-f="lr" data-wk="${wk}" data-si="${si}" placeholder="rip" style="width:32px"/>
        </span>`;
      }).join('');
    } else if(isCurrent){
      setsHtml=`<div style="font-size:11px;color:var(--y);margin-bottom:6px;font-weight:600">Inserisci i kg di oggi:</div>`
      +(ex.sets||[]).map((s,si)=>`<span class="set-pill" style="border-color:rgba(245,200,66,.3)">
        <span style="font-size:10px;color:var(--tx3)">${si+1}.</span>
        <input type="number" data-f="nw" data-si="${si}" placeholder="${s.weight||'kg'}"/>
        <span style="font-size:10px;color:var(--tx3)">kg×</span>
        <input type="number" data-f="nr" data-si="${si}" placeholder="${s.reps||'rip'}" style="width:32px"/>
      </span>`).join('');
    } else {
      setsHtml=(ex.sets||[]).map((s,si)=>`<span class="set-pill" style="opacity:.35">
        <span style="font-size:11px;color:var(--tx3)">${si+1}. ${s.weight||'?'}kg×${s.reps||'?'}</span>
      </span>`).join('');
    }

    return`<div class="wk-card ${cls}">
      <div class="rsb mb8">
        <div class="row"><span style="font-size:11px;font-weight:800;color:${col}">SETTIMANA ${wk}</span>
          ${hasLog?`<span style="font-size:10px;color:var(--tx3)">${fmtDate(log.date)}</span>`:''}
          ${isCurrent?`<span style="font-size:10px;color:var(--y)">← oggi</span>`:''}
        </div>
        ${hasLog?`<button class="btn-del" data-a="del-log" data-wk="${wk}" style="font-size:12px">🗑️</button>`:''}
        ${isCurrent?`<button class="btn-mini" data-a="save-log" data-wk="${wk}">✓ Salva</button>`:''}
      </div>
      <div style="display:flex;flex-wrap:wrap">${setsHtml}</div>
    </div>`;
  }).join('');

  return`
  <div class="topbar">
    <button class="btn-back" data-a="back-log">←</button>
    <div class="f1" style="margin:0 8px">
      <div class="logo" style="font-size:16px">${esc(defName)}</div>
      <div class="sub">${esc(m.label)} · ${done}/${weeks} sett. ${bw?`· Max: ${bw}kg`:''}</div>
    </div>
    <button class="btn-sm" data-a="save-log-back">Salva</button>
  </div>
  <div class="scroll pad">
    <div class="card mb8">
      <div class="rsb mb8"><span class="lbl" style="margin:0">PROGRESSIONE ${m.label}</span>
        <span style="font-size:12px;color:var(--y);font-weight:700">${pct}%</span></div>
      <div class="prog-bar" style="height:5px"><div class="prog-fill" style="width:${pct}%;background:var(--y)"></div></div>
      ${bw?`<div style="font-size:11px;color:var(--tx3);margin-top:8px">🏆 Record: <b style="color:var(--y)">${bw} kg</b></div>`:''}
    </div>
    <div class="sec">Storico settimane — ${esc(m.label)}</div>
    ${weekCards}
  </div>`;
}

// ═══════════════════════════════════════════════════════════════
// PROGRESS VIEW — grafici
// ═══════════════════════════════════════════════════════════════
function renderProgress(){
  // Collect all exercises with logs across all months
  const exMap={};
  S.months.forEach(m=>{
    m.days.forEach(d=>{
      d.blocks.forEach(b=>{
        const entries=b.type==='single'?[b.exercise]:(b.exercises||[]);
        entries.forEach(ex=>{
          if(!ex||!ex.defId||(ex.logs||[]).length===0) return;
          if(!exMap[ex.defId]) exMap[ex.defId]={defId:ex.defId,monthData:[]};
          // max weight per month
          const maxW=bestW(ex);
          if(maxW>0) exMap[ex.defId].monthData.push({monthKey:m.key,label:m.label,maxW,week:null});
        });
      });
    });
  });

  const entries=Object.values(exMap).filter(e=>e.monthData.length>0);
  const defsSel=S.defs.filter(d=>entries.find(e=>e.defId===d.id));

  return`
  <div class="topbar">
    <div><div class="logo">PROGRESSI</div><div class="sub">Grafico kg nel tempo</div></div>
  </div>
  <div class="scroll pad">
    ${defsSel.length===0?`<div class="empty"><div class="ei">📈</div><div>Nessun dato ancora.<br>Registra qualche allenamento!</div></div>`
    :defsSel.map(def=>{
      const data=exMap[def.id];
      // sort by month
      const sorted=[...data.monthData].sort((a,b)=>a.monthKey.localeCompare(b.monthKey));
      return`<div class="chart-wrap">
        <div style="font-size:13px;font-weight:700;color:var(--tx);margin-bottom:4px">${esc(def.name)}</div>
        <div style="font-size:11px;color:var(--tx3);margin-bottom:10px">${def.muscle} · Max: <b style="color:var(--y)">${Math.max(...sorted.map(s=>s.maxW))}kg</b></div>
        <canvas id="chart-${def.id}" height="140" data-points='${JSON.stringify(sorted)}'></canvas>
      </div>`;
    }).join('')}
  </div>`;
}

function drawCharts(){
  document.querySelectorAll('canvas[data-points]').forEach(canvas=>{
    const pts=JSON.parse(canvas.dataset.points||'[]');
    if(!pts.length) return;
    const W=canvas.offsetWidth||320; const H=140;
    canvas.width=W; canvas.height=H;
    const ctx=canvas.getContext('2d');
    const pad={t:10,r:10,b:32,l:36};
    const vals=pts.map(p=>p.maxW);
    const minV=Math.max(0,Math.min(...vals)-5);
    const maxV=Math.max(...vals)+5;
    const xs=pts.map((_,i)=>pad.l+(i/(Math.max(pts.length-1,1)))*(W-pad.l-pad.r));
    const ys=pts.map(p=>H-pad.b-((p.maxW-minV)/(maxV-minV||1))*(H-pad.t-pad.b));

    // grid
    ctx.strokeStyle='#2a2a2a'; ctx.lineWidth=1;
    for(let i=0;i<4;i++){
      const y=pad.t+i*(H-pad.t-pad.b)/3;
      ctx.beginPath();ctx.moveTo(pad.l,y);ctx.lineTo(W-pad.r,y);ctx.stroke();
      ctx.fillStyle='#555';ctx.font='9px Barlow,sans-serif';ctx.textAlign='right';
      ctx.fillText(Math.round(maxV-i*(maxV-minV)/3)+'kg',pad.l-4,y+3);
    }

    // area fill
    const grad=ctx.createLinearGradient(0,pad.t,0,H-pad.b);
    grad.addColorStop(0,'rgba(245,200,66,.25)');
    grad.addColorStop(1,'rgba(245,200,66,.01)');
    ctx.fillStyle=grad;
    ctx.beginPath();ctx.moveTo(xs[0],H-pad.b);
    xs.forEach((x,i)=>ctx.lineTo(x,ys[i]));
    ctx.lineTo(xs[xs.length-1],H-pad.b);ctx.closePath();ctx.fill();

    // line
    ctx.strokeStyle='#F5C842';ctx.lineWidth=2.5;ctx.lineJoin='round';
    ctx.beginPath();xs.forEach((x,i)=>i===0?ctx.moveTo(x,ys[i]):ctx.lineTo(x,ys[i]));ctx.stroke();

    // dots + labels
    xs.forEach((x,i)=>{
      ctx.fillStyle='#F5C842';ctx.beginPath();ctx.arc(x,ys[i],4,0,Math.PI*2);ctx.fill();
      ctx.fillStyle='#fff';ctx.beginPath();ctx.arc(x,ys[i],2,0,Math.PI*2);ctx.fill();
      ctx.fillStyle='#F5C842';ctx.font='bold 10px Barlow,sans-serif';ctx.textAlign='center';
      ctx.fillText(vals[i]+'kg',x,ys[i]-8);
      // x label (month short)
      ctx.fillStyle='#666';ctx.font='9px Barlow,sans-serif';
      const lbl=pts[i].label.split(' ')[0].slice(0,3);
      ctx.fillText(lbl,x,H-4);
    });
  });
}

    return`<div class="overlay" data-a="close-sheet">
      <div class="sheet" onclick="event.stopPropagation()">
        <div class="sheet-t">Tipo di blocco</div>

          <button class="sheet-opt" data-a="add-block" data-t="${bt.t}" data-did="${S.sheetDayId}">

            <div><div class="ol" style="color:${BCOLOR[bt.t]||'#aaa'}">${bt.label}</div><div class="os">${bt.sub}</div></div>
          </button>`).join('')}
      </div>
    </div>`;
  }
  if(S.sheet==='addDay'){
    return`<div class="overlay" data-a="close-sheet">
      <div class="sheet" onclick="event.stopPropagation()">
        <div class="sheet-t">Nuovo giorno</div>
        <div class="fg"><label class="lbl">Nome giorno</label><input id="newdayname" placeholder="es. Push, Gambe, Giorno A..."/></div>
        <button class="btn" data-a="confirm-add-day">Aggiungi</button>
        <button class="btn-ghost mt8" data-a="close-sheet">Annulla</button>
      </div>
    </div>`;
  }
  if(S.sheet==='pickMonth'){
    const now2=new Date();
    const options=[];
    for(let i=-1;i<=12;i++){
      const d=new Date(now2.getFullYear(),now2.getMonth()+i,1);
      const y=d.getFullYear(),mo=d.getMonth();
      const k=monthKey(y,mo);
      const exists=S.months.find(m=>m.key===k);
      options.push({y,mo,k,label:monthLabel(y,mo),exists});
    }
    return`<div class="overlay" data-a="close-sheet">
      <div class="sheet" onclick="event.stopPropagation()">
        <div class="sheet-t">Seleziona mese</div>
        ${options.map(o=>`
          <button class="sheet-opt ${o.exists?'on':''}" data-a="pick-month" data-y="${o.y}" data-mo="${o.mo}">
            <span class="oi">📅</span>
            <div><div class="ol">${o.label}</div>${o.exists?'<div class="os" style="color:var(--y)">Scheda esistente — verrà aperta</div>':'<div class="os">Crea nuova scheda</div>'}</div>
          </button>`).join('')}
      </div>
    </div>`;
  }
  return'';
}

// ═══════════════════════════════════════════════════════════════
// EVENTS
// ═══════════════════════════════════════════════════════════════
function bindAll(){
  document.addEventListener('input',onInput,{passive:true});
  document.addEventListener('change',onInput,{passive:true});
  document.querySelectorAll('[data-a]').forEach(el=>{
    el.addEventListener('click',e=>{
      if(['INPUT','SELECT','TEXTAREA'].includes(e.target.tagName)) return;
      e.stopPropagation();
      handle(el.dataset.a,el.dataset,el);
    });
  });
}

function onInput(e){
  const el=e.target,f=el.dataset.f;
  if(!f) return;

  // Def form — update silently, no re-render
  if(el.id==='dn'){
    if(S.editingDef) S.editingDef.name=el.value;
    const b=document.getElementById('sdb');
    if(b) b.style.opacity=el.value.trim()?'1':'.4';
    return;
  }
  if(el.id==='dn2'){ if(S.editingDef) S.editingDef.notes=el.value; return; }
  if(el.id==='newdayname') return;

  // Day name
  if(el.dataset.did&&el.id==='dayname'){
    mutDay(el.dataset.did,d=>{d.name=el.value;},true); return;
  }

  // Block fields — silent (no re-render while typing)
  const bid=el.dataset.bid;
  if(bid){
    if(f==='brest')       mutBlock(bid,b=>{b.rest=el.value;},true);
    if(f==='bnote')       mutBlock(bid,b=>{b.note=el.value;},true);
    if(f==='emom-dur')    mutBlock(bid,b=>{b.duration=el.value;},true);
    if(f==='emom-int')    mutBlock(bid,b=>{b.interval=el.value;},true);
    if(f==='amrap-dur')   mutBlock(bid,b=>{b.duration=el.value;},true);
    if(f==='circ-rounds') mutBlock(bid,b=>{b.rounds=el.value;},true);
    if(f==='circ-rest')   mutBlock(bid,b=>{b.rest=el.value;},true);
    if(f==='emom-text'||f==='emom-reps'){
      const ei=parseInt(el.dataset.ei);
      mutBlock(bid,b=>{b.exercises[ei][f==='emom-text'?'text':'reps']=el.value;},true);
    }
    if(f==='amrap-text'||f==='amrap-reps'){
      const ei=parseInt(el.dataset.ei);
      mutBlock(bid,b=>{b.exercises[ei][f==='amrap-text'?'text':'reps']=el.value;},true);
    }
    return;
  }

  // Entry/set fields — silent
  const p=el.dataset.p;
  if(p){ mutEntryByPrefix(p,f,el,null,true); return; }

  // Log fields — silent
  if(f==='lw'||f==='lr'){
    const wk=parseInt(el.dataset.wk),si=parseInt(el.dataset.si);
    mutActiveEx(ex=>{
      const log=ex.logs.find(l=>l.week===wk);
      if(log&&log.sets[si]) log.sets[si][f==='lw'?'weight':'reps']=el.value;
    },true);
  }
}

function handle(a,ds){
  switch(a){
    case'nav': ss({view:ds.v}); break;
    case'lib-f': ss({libFilter:ds.v}); break;
    case'new-def': ss({editingDef:newDef(),view:'addDef'}); break;
    case'edit-def': ss({editingDef:clone(S.defs.find(x=>x.id===ds.id)),view:'addDef'}); break;
    case'del-def': if(confirm('Eliminare?')) ss({defs:S.defs.filter(d=>d.id!==ds.id)}); break;
    case'cancel-def': ss({view:'library'}); break;
    case'def-muscle':
      // Update muscle silently, just re-render the chips without losing input focus
      if(S.editingDef) S.editingDef.muscle=ds.v;
      // Re-render only the muscle chips area
      document.querySelectorAll('[data-a="def-muscle"]').forEach(btn=>{
        btn.classList.toggle('on', btn.dataset.v===ds.v);
      });
      break;
    case'save-def': {
      const nm=document.getElementById('dn')?.value||'';
      if(!nm.trim()) return;
      const d={...S.editingDef,name:nm,notes:document.getElementById('dn2')?.value||''};
      const exists=S.defs.find(x=>x.id===d.id);
      ss({defs:exists?S.defs.map(x=>x.id===d.id?d:x):[...S.defs,d],view:'library'});
      break;
    }

    case'new-month': ss({sheet:'pickMonth'}); break;
    case'pick-month': {
      const y=parseInt(ds.y),mo=parseInt(ds.mo);
      const k=monthKey(y,mo);
      const ex=S.months.find(m=>m.key===k);
      const m=ex?clone(ex):newMonthPlan(y,mo);
      ss({activeMonth:m,activeDayId:m.days[0]?.id||null,expandedBlock:null,sheet:null,view:'month'});
      break;
    }
    case'open-month': {
      const m=clone(S.months.find(x=>x.id===ds.id));
      ss({activeMonth:m,activeDayId:m.days[0]?.id||null,expandedBlock:null,view:'month'});
      break;
    }
    case'edit-month': {
      const m=clone(S.months.find(x=>x.id===ds.id));
      ss({activeMonth:m,activeDayId:m.days[0]?.id||null,expandedBlock:null,view:'month'});
      break;
    }
    case'del-month': if(confirm('Eliminare questa scheda mensile?')) ss({months:S.months.filter(m=>m.id!==ds.id)}); break;
    case'back-month': ss({view:'home',activeMonth:null}); break;
    case'save-month': {
      const m=S.activeMonth;
      const exists=S.months.find(x=>x.id===m.id);
      const months=exists?S.months.map(x=>x.id===m.id?m:x):[m,...S.months];
      save('gn_months',months);
      ss({months,view:'home',activeMonth:null});
      break;
    }

    case'sel-day': ss({activeDayId:ds.did,expandedBlock:null}); break;
    case'add-day': ss({sheet:'addDay'}); break;
    case'confirm-add-day': {
      const name=document.getElementById('newdayname')?.value||'Nuovo giorno';
      const d=newDay(name);
      mutMonth(m=>{m.days.push(d);});
      ss({activeDayId:d.id,sheet:null});
      break;
    }
    case'del-day': {
      if(!confirm('Eliminare questo giorno?')) return;
      mutMonth(m=>{m.days=m.days.filter(d=>d.id!==ds.did);});
      ss({activeDayId:S.activeMonth.days[0]?.id||null});
      break;
    }

    case'open-add-block': ss({sheet:'addBlock',sheetDayId:ds.did}); break;
    case'close-sheet': ss({sheet:null}); break;
    case'add-block': {
      const b=newBlock(ds.t);
      mutDay(ds.did,d=>{d.blocks.push(b);});
      ss({expandedBlock:b.id,sheet:null});
      break;
    }
    case'del-block': {
      mutDay(ds.did,d=>{d.blocks=d.blocks.filter(b=>b.id!==ds.bid);});
      ss({});
      break;
    }
    case'toggle-block': ss({expandedBlock:S.expandedBlock===ds.bid?null:ds.bid}); break;

    case'add-set': mutEntryByPrefix(ds.p,'add-set',null); break;
    case'del-set': mutEntryByPrefix(ds.p,'del-set',null,ds.sid); break;
    case'add-emom-ex': mutBlock(ds.bid,b=>{b.exercises.push({id:uid(),text:'',reps:''});}); break;
    case'del-emom-ex': mutBlock(ds.bid,b=>{b.exercises.splice(parseInt(ds.ei),1);}); break;
    case'add-amrap-ex': mutBlock(ds.bid,b=>{b.exercises.push({id:uid(),text:'',reps:''});}); break;
    case'del-amrap-ex': mutBlock(ds.bid,b=>{b.exercises.splice(parseInt(ds.ei),1);}); break;
    case'add-circ-ex': mutBlock(ds.bid,b=>{b.exercises.push(newExEntry());}); break;
    case'del-circ-ex': mutBlock(ds.bid,b=>{b.exercises.splice(parseInt(ds.ei),1);}); break;

    case'go-log': ss({activeBlockId:ds.bid,activeDayId:ds.did,view:'blockLog'}); break;
    case'back-log': ss({view:'month'}); break;
    case'save-log-back': {
      // save activeMonth to months
      const m=S.activeMonth;
      const exists=S.months.find(x=>x.id===m.id);
      const months=exists?S.months.map(x=>x.id===m.id?m:x):[m,...S.months];
      save('gn_months',months);
      ss({months,view:'month'});
      break;
    }
    case'save-log': {
      const wk=parseInt(ds.wk);
      const nwInputs=[...document.querySelectorAll('[data-f="nw"]')];
      const nrInputs=[...document.querySelectorAll('[data-f="nr"]')];
      const sets=nwInputs.map((wi,i)=>({weight:wi.value||'0',reps:nrInputs[i]?.value||'0'}));
      mutActiveEx(ex=>{
        ex.logs=(ex.logs||[]).filter(l=>l.week!==wk);
        ex.logs.push({id:uid(),week:wk,date:new Date().toISOString(),sets});
        ex.logs.sort((a,b)=>a.week-b.week);
      });
      // persist
      const m=S.activeMonth;
      const exists=S.months.find(x=>x.id===m.id);
      const months=exists?S.months.map(x=>x.id===m.id?m:x):[m,...S.months];
      save('gn_months',months);
      ss({months});
      break;
    }
    case'del-log': {
      const wk=parseInt(ds.wk);
      mutActiveEx(ex=>{ex.logs=(ex.logs||[]).filter(l=>l.week!==wk);});
      const m=S.activeMonth;
      const months=S.months.map(x=>x.id===m.id?m:x);
      save('gn_months',months);
      ss({months});
      break;
    }
  }
}

// ═══════════════════════════════════════════════════════════════
// MUTATORS
// ═══════════════════════════════════════════════════════════════
function mutMonth(fn, silent=false){
  if(!S.activeMonth) return;
  fn(S.activeMonth);
  // sync to months array
  S.months = S.months.map(m=>m.id===S.activeMonth.id?S.activeMonth:m);
  if(silent){
    save('gn_months',S.months);
  } else {
    ss({activeMonth:S.activeMonth, months:S.months});
  }
}
function mutDay(did,fn,silent=false){
  if(!S.activeMonth) return;
  const d=S.activeMonth.days.find(x=>x.id===did);
  if(d) fn(d);
  S.months=S.months.map(m=>m.id===S.activeMonth.id?S.activeMonth:m);
  if(silent){
    save('gn_months',S.months);
  } else {
    ss({activeMonth:S.activeMonth,months:S.months});
  }
}
function mutBlock(bid,fn,silent=false){
  if(!S.activeMonth) return;
  S.activeMonth.days.forEach(d=>{const b=d.blocks.find(x=>x.id===bid);if(b)fn(b);});
  S.months=S.months.map(m=>m.id===S.activeMonth.id?S.activeMonth:m);
  if(silent){
    save('gn_months',S.months);
  } else {
    ss({activeMonth:S.activeMonth,months:S.months});
  }
}
function mutEntryByPrefix(prefix,f,el,extraSid,silent=false){
  const parts=prefix.split('-');
  const ptype=parts[0];
  const bid=parts[1];
  const ei=parts[2]!==undefined?parseInt(parts[2]):-1;

  if(!S.activeMonth) return;
  S.activeMonth.days.forEach(d=>{
    const b=d.blocks.find(x=>x.id===bid);
    if(!b) return;
    let entry;
    if(ptype==='sx') entry=b.exercise;
    else if(ptype==='mx') entry=b.exercises[ei];
    else if(ptype==='cx') entry=b.exercises[ei];
    if(!entry) return;

    if(f==='add-set'){entry.sets.push(newSetPlan());return;}
    if(f==='del-set'){entry.sets=entry.sets.filter(s=>s.id!==extraSid);return;}
    if(f==='edef'){entry.defId=el.value||null;return;}
    if(f==='sw'||f==='sr'||f==='srest'){
      entry.sets=entry.sets.map(s=>{
        if(s.id!==el.dataset.sid)return s;
        return{...s,[f==='sw'?'weight':f==='sr'?'reps':'rest']:el.value};
      });
    }
  });
  S.months=S.months.map(m=>m.id===S.activeMonth.id?S.activeMonth:m);
  if(silent){
    save('gn_months',S.months);
  } else {
    ss({activeMonth:S.activeMonth,months:S.months});
  }
}
function mutActiveEx(fn,silent=false){
  const did=S.activeDayId,bid=S.activeBlockId;
  if(!S.activeMonth) return;
  const d=S.activeMonth.days.find(x=>x.id===did);
  if(!d) return;
  const b=d.blocks.find(x=>x.id===bid);
  if(!b||b.type!=='single') return;
  fn(b.exercise);
  S.months=S.months.map(m=>m.id===S.activeMonth.id?S.activeMonth:m);
  if(silent){
    save('gn_months',S.months);
  } else {
    ss({activeMonth:S.activeMonth,months:S.months});
  }
}

// BOOT
// ═══════════════════════════════════════════════════════════════
render();
</script>
